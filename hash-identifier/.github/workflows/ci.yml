name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest --cov=hash_identifier --cov-report=term-missing

      - name: Smoke-test CLI (MD5)
        run: hashid 5f4dcc3b5aa765d61d8327deb882cf99

      - name: Smoke-test CLI (bcrypt)
        run: hashid '$2b$12$EixZaYVK1fsbw1ZfbX3OXePaWxn96p36WQoeG6Lruj3vjPGga31lW'

      - name: Smoke-test JSON output
        run: |
          hashid --json 5f4dcc3b5aa765d61d8327deb882cf99 | python -c "import sys,json; d=json.load(sys.stdin); assert d['candidates'][0]['confidence']=='high'"

      - name: Smoke-test --top flag
        run: |
          result=$(hashid --top 5f4dcc3b5aa765d61d8327deb882cf99)
          echo "Top candidate: $result"
          [[ "$result" == "MD5" ]]
